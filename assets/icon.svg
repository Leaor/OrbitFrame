<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6E40C9"/>
      <stop offset="50%" style="stop-color:#58A6FF"/>
      <stop offset="100%" style="stop-color:#3FB950"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A371F7"/>
      <stop offset="100%" style="stop-color:#58A6FF"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0D1117" stroke="url(#orbGrad)" stroke-width="8"/>
  <!-- Orbital rings -->
  <ellipse cx="256" cy="256" rx="180" ry="70" fill="none" stroke="url(#ringGrad)" stroke-width="6" transform="rotate(30 256 256)" opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="180" ry="70" fill="none" stroke="url(#ringGrad)" stroke-width="6" transform="rotate(-30 256 256)" opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="180" ry="70" fill="none" stroke="url(#ringGrad)" stroke-width="6" transform="rotate(90 256 256)" opacity="0.4"/>
  <!-- Core -->
  <circle cx="256" cy="256" r="40" fill="url(#orbGrad)"/>
  <circle cx="256" cy="256" r="20" fill="#E6EDF3" opacity="0.9"/>
  <!-- Orbiting dots -->
  <circle cx="400" cy="180" r="10" fill="#58A6FF"/>
  <circle cx="112" cy="332" r="8" fill="#A371F7"/>
  <circle cx="340" cy="400" r="6" fill="#3FB950"/>
</svg>
